<!-- ========================================
     KARYAWAN PAGE - HALAMAN KELOLA PENGGUNA
     ======================================== -->

<!-- CARD PENGGUNA -->
<div class="card">
    <!-- HEADER CARD DENGAN TOMBOL TAMBAH -->
    <div class="card-header">
        <h2 class="card-title">Kelola Pengguna (Karyawan)</h2>
        <button class="btn btn-success" onclick="openAddUserModal()">+ Tambah Pengguna</button>
    </div>
    
    <!-- TABEL DATA PENGGUNA -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nama</th>
                <th>Email</th>
                <th>Departemen</th>
                <th>Posisi</th>
                <th>Role</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="users-tbody">
            <!-- DATA AKAN DIMUAT DARI API -->
            <tr>
                <td colspan="8" style="text-align: center; color: #999;">Loading...</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- CONTAINER UNTUK MODAL UPDATE / TAMBAH -->
<div id="update-container"></div>
