<!-- ========================================
     ATTENDANCE PAGE - HALAMAN KEHADIRAN
     ======================================== -->

<!-- CARD FILTER DAN PENCARIAN -->
<div class="card" style="margin-bottom: 20px;">
    <div class="card-header">
        <h2 class="card-title">Filter Kehadiran</h2>
    </div>
    
    <!-- FORM FILTER -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
        <!-- FILTER TANGGAL MULAI -->
        <div class="form-group" style="margin-bottom: 0;">
            <label for="filterDateFrom">Dari Tanggal:</label>
            <input type="date" id="filterDateFrom">
        </div>
        
        <!-- FILTER TANGGAL AKHIR -->
        <div class="form-group" style="margin-bottom: 0;">
            <label for="filterDateTo">Sampai Tanggal:</label>
            <input type="date" id="filterDateTo">
        </div>
        
        <!-- FILTER STATUS -->
        <div class="form-group" style="margin-bottom: 0;">
            <label for="filterStatus">Status:</label>
            <select id="filterStatus">
                <option value="">-- Semua Status --</option>
                <option value="on_time">Tepat Waktu</option>
                <option value="late">Terlambat</option>
                <option value="absent">Tidak Hadir</option>
            </select>
        </div>
        
        <!-- TOMBOL FILTER -->
        <div style="display: flex; align-items: flex-end;">
            <button class="btn btn-primary" onclick="applyAttendanceFilter()" style="width: 100%;">🔍 Filter</button>
        </div>
    </div>
</div>

<!-- CARD DATA KEHADIRAN -->
<div class="card">
    <!-- HEADER CARD -->
    <div class="card-header">
        <h2 class="card-title">Data Kehadiran</h2>
    </div>
    
    <!-- TABEL KEHADIRAN -->
    <table>
        <thead>
            <tr>
                <th>Nama Karyawan</th>
                <th>Tanggal</th>
                <th>Jam Masuk</th>
                <th>Jam Keluar</th>
                <th>Status</th>
                <th>Lokasi</th>
            </tr>
        </thead>
        <tbody id="attendance-tbody">
            <!-- DATA AKAN DIMUAT DARI API -->
            <tr>
                <td colspan="6" style="text-align: center; color: #999;">Loading...</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- LINK SCRIPT ATTENDANCE PAGE -->
<script src="/js/attendance.js"></script>
